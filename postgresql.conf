# Archivo de configuración optimizado para PostgreSQL
listen_addresses = '*'
max_connections = 100

# shared_buffers: Configúralo al 25% de la memoria RAM total disponible
# (Ejemplo asumiendo un servidor con 8GB de RAM)
shared_buffers = 2GB

# work_mem: Incrementado para permitir ordenamiento complejo en memoria
work_mem = 16MB

# Otros parámetros útiles para rendimiento (sugeridos)
maintenance_work_mem = 512MB
effective_cache_size = 6GB
