<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLM | Login Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Effect */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            top: -150px;
            left: -150px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .ambient-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(15,23,42,0) 70%);
            bottom: -100px;
            right: -100px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphism Card */
        .login-container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            position: relative;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .login-container:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 32px;
            font-weight: 300;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            margin-top: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
            color: #cbd5e1;
            margin-top: 12px;
        }

        button.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            transform: none;
        }

        /* Forms logic */
        #totp-form {
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s ease;
        }

        #totp-form.active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        #credentials-form {
            transition: all 0.4s ease;
        }

        #credentials-form.hidden {
            display: none;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            display: inline-block;
        }
        
        button.loading .btn-text { display: none; }
        button.loading .spinner { display: inline-block; }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <div class="login-container">
        <h2>Acceso Seguro</h2>
        <p class="subtitle" id="form-subtitle">Ingresa tus credenciales para acceder al sistema de gestión CLM.</p>

        <div id="error-box" class="error-message"></div>

        <!-- Form 1: Username & Password -->
        <form id="credentials-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="admin" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="btn-login">
                <span class="btn-text">Ingresar</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- Form 2: TOTP / 2FA -->
        <form id="totp-form" onsubmit="handleTotp(event)">
            <div class="input-group">
                <label for="totp">Código de Autenticador (2FA)</label>
                <input type="text" id="totp" placeholder="123456" autocomplete="one-time-code" maxlength="6">
            </div>
            <button type="submit" id="btn-totp">
                <span class="btn-text">Verificar Código</span>
                <span class="spinner"></span>
            </button>
            <button type="button" class="btn-secondary" onclick="goBack()">Volver</button>
        </form>
    </div>

    <script>
        let currentUser = '';
        let currentPass = '';

        async function postData(url, data) {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            return response;
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-box').style.display = 'none';
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if(isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            
            currentUser = document.getElementById('username').value;
            currentPass = document.getElementById('password').value;

            setLoading('btn-login', true);

            try {
                const res = await postData('/api/auth/login/', {
                    username: currentUser,
                    password: currentPass
                });
                
                const data = await res.json();
                
                if (res.status === 200) {
                    window.location.href = '/admin/'; // Redirigir al panel de control
                } else if (res.status === 401 && data.require_2fa) {
                    // Transición suave al formulario 2FA
                    document.getElementById('credentials-form').classList.add('hidden');
                    setTimeout(() => {
                        const totpForm = document.getElementById('totp-form');
                        totpForm.classList.add('active');
                        document.getElementById('form-subtitle').textContent = "Ingresa el código de 6 dígitos de tu aplicación autenticadora.";
                        document.getElementById('totp').focus();
                    }, 50);
                } else {
                    showError(data.error || 'Ocurrió un error al iniciar sesión.');
                }
            } catch (err) {
                showError('Error de conexión. Revisa tu red e intenta nuevamente.');
            } finally {
                setLoading('btn-login', false);
            }
        }

        async function handleTotp(e) {
            e.preventDefault();
            hideError();
            
            const otpCode = document.getElementById('totp').value;
            if(!otpCode) {
                showError('Por favor ingresa el código 2FA.');
                return;
            }

            setLoading('btn-totp', true);

            try {
                const res = await postData('/api/auth/login/', {
                    username: currentUser,
                    password: currentPass,
                    otp_token: otpCode
                });
                
                const data = await res.json();
                
                if (res.status === 200) {
                    window.location.href = '/admin/'; // Acceso concedido
                } else {
                    showError(data.error || 'Código inválido o expirado.');
                }
            } catch (err) {
                showError('Error de conexión. Intenta nuevamente.');
            } finally {
                setLoading('btn-totp', false);
            }
        }

        function goBack() {
            hideError();
            document.getElementById('totp').value = '';
            document.getElementById('totp-form').classList.remove('active');
            setTimeout(() => {
                document.getElementById('credentials-form').classList.remove('hidden');
                document.getElementById('form-subtitle').textContent = "Ingresa tus credenciales para acceder al sistema de gestión CLM.";
            }, 400);
        }
    </script>
</body>
</html>
